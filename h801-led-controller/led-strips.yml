esphome:
  name: led-strips

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "H801-led-strips Fallback"
    password: !secret wifi_fallback_password

captive_portal:
    
output:
  - platform: esp8266_pwm
    pin: 12
    frequency: 1000 Hz
    id: pwm_b
  - platform: esp8266_pwm
    pin: 13
    frequency: 1000 Hz
    id: pwm_g
  - platform: esp8266_pwm
    pin: 15
    frequency: 1000 Hz
    id: pwm_r
  - platform: esp8266_pwm
    pin: 14
    frequency: 1000 Hz
    id: pwm_w1
  - platform: esp8266_pwm
    pin: 4
    frequency: 1000 Hz
    id: pwm_w2

light:
  - platform: monochromatic
    name: "Output B"
    output: pwm_b
    effects:
      - pulse:
  - platform: monochromatic
    name: "Output G"
    output: pwm_g
    effects:
      - pulse:
  - platform: monochromatic
    name: "Output R"
    output: pwm_r
    effects:
      - pulse:
  - platform: monochromatic
    name: "Output W1"
    output: pwm_w1
    effects:
      - pulse:
  - platform: monochromatic
    name: "Output W2"
    output: pwm_w2
    effects:
      - pulse:

status_led:
  pin: 5